<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shylit (SHL) - Web3 Token Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/index.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #08080c;
            --main-neon: #00ffcc;
            --sub-neon: #ff00ff;
            --text-color: #e0e0e0;
            --card-bg: rgba(20, 20, 25, 0.7);
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 204, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 255, 0.05) 0%, transparent 40%);
            color: var(--text-color);
            overflow-x: hidden;
            line-height: 1.6;
        }
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(8, 8, 12, 0.9);
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--main-neon); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--main-neon); }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-size: 0.9rem; transition: var(--transition); }
        .nav-links a:hover { color: var(--main-neon); }
        .btn-connect {
            background: transparent; border: 1px solid var(--main-neon); color: var(--main-neon);
            padding: 8px 20px; border-radius: 5px; font-weight: 500; cursor: pointer; transition: var(--transition); font-size: 0.85rem;
        }
        .btn-connect:hover { background: var(--main-neon); color: #08080c; box-shadow: 0 0 15px var(--main-neon); }
        main { padding: 120px 50px; display: flex; flex-direction: column; align-items: center; text-align: center; min-height: 100vh; }
        .hero-title { font-size: 4rem; font-weight: 700; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 20px; color: white; }
        .hero-title span { color: var(--main-neon); text-shadow: 0 0 15px var(--main-neon); }
        .hero-subtitle { font-size: 1.2rem; color: #a0a0a0; max-width: 600px; margin-bottom: 50px; font-weight: 300; }
        .dapp-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 40px;
            width: 100%; max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            transition: var(--transition);
        }
        .card-header { margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .card-header h3 { font-size: 1.1rem; color: #fff; margin-bottom: 5px; }
        .card-header small { color: var(--main-neon); font-size: 0.7rem; font-weight: 700; }
        .stats-group { display: flex; justify-content: space-between; margin-bottom: 30px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 20px; }
        .stat { text-align: left; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.4rem; color: white; font-weight: 500; }
        .btn-action {
            width: 100%; background: linear-gradient(135deg, var(--main-neon), var(--sub-neon));
            color: #08080c; border: none; padding: 15px; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-action:hover { box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); opacity: 0.9; }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }
        .status-msg { margin-top: 15px; font-size: 0.8rem; min-height: 1.2rem; color: #888; word-break: break-all; }
        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .nav-links { display: none; }
            .hero-title { font-size: 2.5rem; }
            main { padding: 100px 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Shylit</div>
        <div class="nav-links">
            <a href="https://sepolia.etherscan.io/token/0x71f6b0f218059FdaFFFaF646Bc582EC5Dd423BB4" target="_blank">Etherscan🔗</a>
            <a href="https://oxpackusetad.github.io/" target="_blank">Portfolio</a>
        </div>
        <button class="btn-connect" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
    </nav>

    <main>
        <h1 class="hero-title">Welcome to<br><span>The Shylit</span> Ecosystem</h1>
        <p class="hero-subtitle">Masa depan utilitas Web3 dan AI, dimulai dari eksperimen tokenomics sederhana di Sepolia Testnet.</p>

        <div class="dapp-card">
            <div class="card-header">
                <h3>Token Faucet</h3>
                <small>Claim your first SHL</small>
            </div>
            <div class="stats-group">
                <div class="stat">
                    <div class="stat-label">Symbol</div>
                    <div class="stat-value">SHL</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Claim Amount</div>
                    <div class="stat-value">100</div>
                </div>
            </div>
            <button class="btn-action" id="claimBtn" onclick="claimToken()" disabled>Connect Wallet to Claim</button>
            <p class="status-msg" id="statusMsg"></p>
        </div>
    </main>

    <script>
        const CONTRACT_ADDRESS = "0x71f6b0f218059FdaFFFaF646Bc582EC5Dd423BB4"; 
        const ABI = ["function mint(address to, uint256 amount) public"];

        let signer = null;
        let contract = null;

        async function connectWallet() {
            const statusMsg = document.getElementById('statusMsg');
            const connectBtn = document.getElementById('connectBtn');
            const claimBtn = document.getElementById('claimBtn');

            if (typeof window.ethereum !== 'undefined') {
                try {
                    statusMsg.innerText = "Membuka Wallet...";
                    // Gunakan requestAccounts untuk kompatibilitas lebih baik
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    
                    // Cek Jaringan
                    const network = await provider.getNetwork();
                    if (network.chainId !== 11155111n) {
                        statusMsg.innerText = "Salah Jaringan! Mohon pindah ke Sepolia Testnet.";
                        try {
                            await window.ethereum.request({
                                method: 'wallet_switchEthereumChain',
                                params: [{ chainId: '0xaa36a7' }],
                            });
                        } catch (e) { console.error(e); }
                        return;
                    }

                    signer = await provider.getSigner();
                    const userAddress = await signer.getAddress();
                    
                    connectBtn.innerText = userAddress.substring(0, 6) + "..." + userAddress.substring(38);
                    connectBtn.style.color = "var(--sub-neon)";
                    
                    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                    
                    claimBtn.innerText = "Claim 100 Free SHL";
                    claimBtn.disabled = false;
                    statusMsg.innerText = "Terhubung! Silakan klik Claim.";
                    statusMsg.style.color = "var(--main-neon)";
                } catch (error) {
                    console.error(error);
                    statusMsg.innerText = "Koneksi Ditolak: " + error.message;
                }
            } else {
                alert("Gunakan Browser di dalam MetaMask atau OKX Wallet!");
            }
        }

        async function claimToken() {
            const statusMsg = document.getElementById('statusMsg');
            const claimBtn = document.getElementById('claimBtn');

            if (!signer || !contract) return;
            try {
                statusMsg.innerText = "Konfirmasi transaksi di wallet kamu...";
                claimBtn.innerText = "Sedang Memproses...";
                claimBtn.disabled = true;

                const amount = ethers.parseUnits("100", 18);
                const userAddress = await signer.getAddress();

                const tx = await contract.mint(userAddress, amount);
                statusMsg.innerText = "Transaksi terkirim! Menunggu konfirmasi blockchain...";
                
                await tx.wait(); 
                
                statusMsg.innerText = "Berhasil! 100 SHL sudah masuk ke wallet kamu.";
                statusMsg.style.color = "#00ff00";
                claimBtn.innerText = "Claim Selesai!";
            } catch (error) {
                console.error(error);
                statusMsg.innerText = "Gagal: Pastikan saldo Sepolia ETH cukup & kamu adalah owner.";
                statusMsg.style.color = "#ff4444";
                claimBtn.innerText = "Coba Lagi";
                claimBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
